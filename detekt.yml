naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']
    excludes: ['**/src/test/**', '**/src/*Test/**']

  TopLevelPropertyNaming:
    active: false

style:
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    excludes: ['**/src/test/**', '**/src/*Test/**']

  UnusedPrivateMember:
    ignoreAnnotated: ['Preview']

complexity:
  LongMethod:
    threshold: 80

  TooManyFunctions:
    ignorePrivate: true

  LongParameterList:
    ignoreAnnotated: ['Composable']
    ignoreDefaultParameters: true

PrimalRuleSet:
  active: true
  RequireCustomRunCatching:
    active: true
  RequireCustomResult:
    active: true
